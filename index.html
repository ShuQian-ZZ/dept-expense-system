<style id="premium-visual-refresh">
/* ===== Premium visual refresh: CSS-only, no business logic changes ===== */
:root{
  --background: 215 42% 97%;
  --foreground: 222 47% 11%;
  --card: 0 0% 100%;

  --primary-foreground: 0 0% 100%;
  --secondary: 214 44% 95%;
  --muted: 215 32% 94%;

  --border: 216 28% 88%;

  --radius: 1rem;
}
html{scroll-behavior:smooth;}
body{

  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif !important;
  background:

    radial-gradient(circle at 92% 10%, rgba(14,165,233,.16) 0, rgba(14,165,233,.07) 22%, transparent 40%),

  background-attachment: fixed !important;
  letter-spacing:.01em;
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-2;
  opacity:.42;
  background-image:

    linear-gradient(90deg, rgba(37,99,235,.05) 1px, transparent 1px);

  mask-image:linear-gradient(to bottom, #000, transparent 86%);
}
body:after{
  content:"";
  position:fixed;
  width:520px;height:520px;
  right:-220px;top:170px;
  border-radius:999px;
  pointer-events:none;
  z-index:-1;
  background:conic-gradient(from 180deg, rgba(37,99,235,.18), rgba(20,184,166,.08), rgba(124,58,237,.12), rgba(37,99,235,.18));
  filter:blur(30px);
  opacity:.55;
}
#root{min-height:100vh;position:relative;isolation:isolate;}
.glass,
.sticky,
[class*="bg-white/80"],
[class*="bg-gray-50/80"]{
  background:rgba(255,255,255,.78) !important;
  backdrop-filter:blur(22px) saturate(1.35) !important;
  -webkit-backdrop-filter:blur(22px) saturate(1.35) !important;
  border-color:rgba(255,255,255,.72) !important;
  box-shadow:0 12px 34px rgba(30,64,175,.08), inset 0 1px 0 rgba(255,255,255,.75) !important;
}
.card-apple,
.stat-card-apple,
[data-slot="card"],
.rounded-xl.bg-white,
.rounded-2xl.bg-white,
[class*="shadow-sm"].bg-white,
[class*="shadow-md"].bg-white{
  background:linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.82)) !important;
  border:1px solid rgba(255,255,255,.82) !important;
  box-shadow:
    0 18px 45px rgba(15,23,42,.075),
    0 2px 8px rgba(15,23,42,.045),
    inset 0 1px 0 rgba(255,255,255,.85) !important;
  backdrop-filter:blur(18px) saturate(1.2) !important;
  -webkit-backdrop-filter:blur(18px) saturate(1.2) !important;
  border-radius:20px !important;
}
.card-apple:hover,
.stat-card-apple:hover,
[data-slot="card"]:hover,
.rounded-xl.bg-white:hover,
.rounded-2xl.bg-white:hover{
  transform:translateY(-2px);
  box-shadow:
    0 24px 60px rgba(15,23,42,.10),
    0 7px 18px rgba(37,99,235,.08),
    inset 0 1px 0 rgba(255,255,255,.9) !important;
}
.stat-card-apple{padding:22px !important;}
.stat-card-apple:before{
  width:5px !important;
  background:linear-gradient(180deg,#2563eb,#22c55e) !important;
  box-shadow:0 0 18px rgba(37,99,235,.34);
}
button,
.btn-apple,
[role="button"],
button.bg-primary,
button.bg-blue-600,
button.bg-blue-500{
  transition:transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease !important;
}
button.bg-primary,
button.bg-blue-600,
button.bg-blue-500,
.btn-apple.bg-primary,
.bg-primary.text-primary-foreground{
  background:linear-gradient(135deg,#2563eb 0%,#0ea5e9 100%) !important;
  box-shadow:0 10px 22px rgba(37,99,235,.24), inset 0 1px 0 rgba(255,255,255,.28) !important;
  border-color:rgba(255,255,255,.22) !important;
}
button:hover,
[role="button"]:hover{transform:translateY(-1px);}
button:active,
[role="button"]:active{transform:translateY(0) scale(.985) !important;}
input,textarea,select,[data-slot="select-trigger"]{
  background:rgba(255,255,255,.78) !important;
  border-color:rgba(148,163,184,.36) !important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.85), 0 1px 2px rgba(15,23,42,.03) !important;
  border-radius:12px !important;
}
input:focus,textarea:focus,select:focus,[data-slot="select-trigger"]:focus{
  background:#fff !important;
  border-color:rgba(37,99,235,.55) !important;
  box-shadow:0 0 0 4px rgba(37,99,235,.12), 0 8px 20px rgba(37,99,235,.08) !important;
}
table{border-collapse:separate !important;border-spacing:0 8px !important;}
thead tr{background:transparent !important;}
th{
  color:#64748b !important;
  font-weight:700 !important;
  letter-spacing:.06em !important;
  text-transform:uppercase;
}
tbody tr{
  background:rgba(255,255,255,.76) !important;
  box-shadow:0 8px 24px rgba(15,23,42,.045) !important;
  transition:transform .16s ease, box-shadow .16s ease, background .16s ease !important;
}
tbody tr:hover{
  background:rgba(255,255,255,.96) !important;
  transform:translateY(-1px);
  box-shadow:0 14px 32px rgba(37,99,235,.09) !important;
}
tbody td:first-child{border-radius:14px 0 0 14px !important;}
tbody td:last-child{border-radius:0 14px 14px 0 !important;}
.badge,
[class*="rounded-full"].bg-blue-100,
[class*="rounded-full"].bg-green-100,
[class*="rounded-full"].bg-orange-100,
[class*="rounded-full"].bg-red-100,
[class*="rounded-full"].bg-amber-50{
  border:1px solid rgba(255,255,255,.75) !important;
  box-shadow:0 5px 13px rgba(15,23,42,.055), inset 0 1px 0 rgba(255,255,255,.7) !important;
}
.bg-blue-50,.bg-blue-100{background:linear-gradient(135deg,#eff6ff,#dbeafe) !important;}
.bg-green-100{background:linear-gradient(135deg,#ecfdf5,#dcfce7) !important;}
.bg-orange-100,.bg-amber-50{background:linear-gradient(135deg,#fff7ed,#ffedd5) !important;}
.bg-red-100{background:linear-gradient(135deg,#fff1f2,#fee2e2) !important;}
.bg-purple-100{background:linear-gradient(135deg,#faf5ff,#f3e8ff) !important;}
.text-gray-800,.text-foreground{color:#102033 !important;}
.text-gray-600,.text-muted-foreground{color:#667085 !important;}
.text-gray-500{color:#7b8797 !important;}
h1,h2,h3,[data-slot="card-title"]{
  letter-spacing:-.025em;
}
h1,.text-4xl,.text-6xl{
  background:linear-gradient(135deg,#0f172a 0%,#2563eb 56%,#0ea5e9 100%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent !important;
}
.progress-apple,[role="progressbar"],.bg-gray-100.rounded-full,.h-2.bg-gray-100,.h-2\.5.bg-gray-100{
  background:rgba(148,163,184,.18) !important;
  box-shadow:inset 0 1px 2px rgba(15,23,42,.08) !important;
}
.progress-apple > *,[role="progressbar"] > *, .bg-blue-500,.bg-green-500,.bg-amber-400,.bg-teal-400{
  box-shadow:0 0 16px rgba(37,99,235,.24);
}
[data-slot="dialog-content"],
[role="dialog"]{
  background:rgba(255,255,255,.90) !important;
  backdrop-filter:blur(24px) saturate(1.25) !important;
  -webkit-backdrop-filter:blur(24px) saturate(1.25) !important;
  border:1px solid rgba(255,255,255,.85) !important;
  box-shadow:0 28px 80px rgba(15,23,42,.18), inset 0 1px 0 rgba(255,255,255,.86) !important;
  border-radius:24px !important;
}
nav button,
nav [role="button"],
aside button,
aside a{
  border-radius:14px !important;
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,rgba(37,99,235,.32),rgba(14,165,233,.28));border-radius:999px;border:2px solid rgba(255,255,255,.55);}
::-webkit-scrollbar-track{background:rgba(255,255,255,.2);}
.animate-fade-in,.animate-fade-in-delay-1,.animate-fade-in-delay-2,.animate-fade-in-delay-3,.animate-fade-in-delay-4,.animate-fade-in-delay-5,.animate-fade-in-delay-6{
  animation-duration:.42s !important;

}

<style id="dashboard-refinement-20260623">
/* Dashboard refinement: integrate the primary action into the title area and unify the visual language. */
.dashboard-polished{
  padding:18px;
  border-radius:32px;
  background:
    radial-gradient(circle at 12% 8%, rgba(37,99,235,.10), transparent 30%),
    radial-gradient(circle at 88% 18%, rgba(20,184,166,.10), transparent 34%),
    linear-gradient(180deg, rgba(255,255,255,.42), rgba(255,255,255,.18));
  box-shadow: inset 0 1px 0 rgba(255,255,255,.65);
}
.dashboard-hero{
  position:relative;
  min-height:64px;
  padding:16px 18px;
  border-radius:26px;
  background:rgba(255,255,255,.78);
  border:1px solid rgba(226,232,240,.86);
  box-shadow:0 16px 45px rgba(15,23,42,.055), inset 0 1px 0 rgba(255,255,255,.88);
  backdrop-filter: blur(18px) saturate(1.2);
  -webkit-backdrop-filter: blur(18px) saturate(1.2);
}
.dashboard-hero h2{
  letter-spacing:-.04em;
}
.dashboard-hero h2::before{
  content:"";
  display:inline-block;
  width:8px;
  height:8px;
  margin-right:8px;
  border-radius:999px;
  background:linear-gradient(135deg,#2563eb,#14b8a6);
  box-shadow:0 0 0 5px rgba(37,99,235,.08);
  vertical-align:middle;
}
.dashboard-add-entry{
  top:28px!important;
  right:34px!important;
  left:auto!important;
  transform:none!important;
}
.dashboard-add-btn{
  height:32px!important;
  min-height:32px!important;
  line-height:1!important;
  padding-left:16px!important;
  padding-right:17px!important;
  background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(248,250,252,.86))!important;
  backdrop-filter: blur(14px) saturate(1.25);
  -webkit-backdrop-filter: blur(14px) saturate(1.25);
  box-shadow:0 8px 22px rgba(37,99,235,.09), inset 0 1px 0 rgba(255,255,255,.92)!important;
}
.dashboard-add-btn:hover{
  transform:translateY(-1px);
  border-color:rgba(37,99,235,.25)!important;
  box-shadow:0 12px 28px rgba(37,99,235,.15), inset 0 1px 0 rgba(255,255,255,.95)!important;
}
.dashboard-polished .stat-card-apple,
.dashboard-polished .card-apple{
  background:rgba(255,255,255,.84);
  border:1px solid rgba(226,232,240,.82);
  box-shadow:0 14px 36px rgba(15,23,42,.055), inset 0 1px 0 rgba(255,255,255,.86);
  backdrop-filter: blur(16px) saturate(1.12);
  -webkit-backdrop-filter: blur(16px) saturate(1.12);
}
.dashboard-polished .stat-card-apple:hover,
.dashboard-polished .card-apple:hover{
  transform:translateY(-2px);
  box-shadow:0 18px 44px rgba(15,23,42,.075), inset 0 1px 0 rgba(255,255,255,.9);
}
.dashboard-polished .stat-card-apple{border-radius:22px!important;}
.dashboard-polished .card-apple{border-radius:24px!important;overflow:hidden;}
.dashboard-polished .grid.grid-cols-2.lg\:grid-cols-4{gap:14px;}
.dashboard-polished .card-apple h3{letter-spacing:-.02em;}
.dashboard-polished .card-apple .bg-gray-50\/40{
  background:linear-gradient(180deg, rgba(248,250,252,.82), rgba(255,255,255,.72));
  border-color:rgba(226,232,240,.75);
}
@media (max-width: 640px){
  .dashboard-polished{padding:12px;border-radius:24px;}
  .dashboard-hero{align-items:flex-start;gap:10px;min-height:116px;padding:15px;}
  .dashboard-add-entry{left:27px!important;right:27px!important;top:78px!important;transform:none!important;}
  .dashboard-add-btn{width:100%!important;justify-content:center!important;}
}

  .pd-close,.pd-back{border:1px solid #777;border-radius:50%;background:#111;color:#fff;cursor:pointer}.pd-close{position:absolute;right:30px;top:82px;width:40px;height:40px;font-size:22px}.pd-eyebrow{font:10px ui-monospace,monospace;letter-spacing:.18em;color:#999}.pd-detail h2{margin:11px 0 22px;font-family:"Songti SC","STSong","SimSun",serif;font-size:38px;font-weight:400}.pd-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}.pd-summary div{padding:12px 0;border-bottom:1px solid #333}.pd-summary small{display:block;color:#999}.pd-summary strong{display:block;margin-top:5px;font:20px ui-monospace,monospace}.pd-add{align-self:flex-start;margin-bottom:15px;border:0;border-radius:999px;padding:10px 16px;background:#eee;color:#111;font-weight:700;cursor:pointer}.pd-list{min-height:0;overflow:auto;-webkit-overflow-scrolling:touch}.pd-row{width:100%;display:grid;grid-template-columns:1fr auto;gap:14px;padding:14px 2px;border:0;border-bottom:1px solid #292929;background:transparent;color:#eee;text-align:left;cursor:pointer}.pd-row:hover{background:#141414}.pd-row h3{margin:0 0 5px;font-size:13px}.pd-row p{margin:0;color:#999;font-size:10px}.pd-row b{font:13px ui-monospace,monospace}.pd-sub{position:absolute;z-index:4;inset:70px 0 0;display:none;overflow:auto;padding:20px 42px;background:#090909}.pd-sub.open{display:block}.pd-back{width:38px;height:38px;font-size:18px}.pd-sub h3{font-family:"Songti SC","STSong","SimSun",serif;font-size:30px;font-weight:400}
  #pd-space.inspecting .pd-system>*:not(.selected){filter:blur(4px);opacity:.12}#pd-space.inspecting:before,.pd-space-inspecting{filter:blur(4px)}#pd-space.inspecting .pd-body.selected{z-index:8;opacity:1!important;filter:none!important}
  @media(max-width:820px){#pd-switch{top:62px;right:10px}.pd-system{left:5%;top:43%;width:100vh}.pd-sun{width:130px;height:130px}.pd-people{left:calc(50% + 175px)}.pd-projects{left:calc(50% + 280px);width:68px;height:68px}.pd-categories{left:calc(50% + 390px);width:56px;height:56px}.pd-title{right:16px;bottom:5vh}.pd-title h1{font-size:23px}.pd-title p{font-size:9px}.pd-detail,.pd-detail.left{left:0;right:0;top:38%;bottom:0;width:auto;padding:52px 18px 20px;background:linear-gradient(180deg,transparent,#090909 13%)}.pd-close{right:18px;top:44px}.pd-detail h2{font-size:28px}.pd-sub{padding:16px 18px}}
</style>


<div id="pd-switch" aria-label="看板视图选择"><button data-mode="classic" class="active">经典视图</button><button data-mode="planet">行星视图</button></div>
<section id="pd-space" aria-label="行星看板">
  <div class="pd-stars"></div>
  <div class="pd-trails"></div>
  <div class="pd-system">
    <div class="pd-orbit pd-o1"></div><div class="pd-orbit pd-o2"></div><div class="pd-orbit pd-o3"></div><div class="pd-orbit pd-o4"></div><div class="pd-belt"></div>
    <button class="pd-body pd-sun" data-pd-key="total" aria-label="报账总览"></button>
    <button class="pd-body pd-people" data-pd-key="people" aria-label="人员应报销金额"></button>
    <button class="pd-body pd-projects" data-pd-key="projects" aria-label="项目结算进度"></button>
    <button class="pd-body pd-categories" data-pd-key="categories" aria-label="费用分类统计"></button>
  </div>
  <div class="pd-title"><h1>穿越逆境，终抵繁星</h1><p>Per aspera ad astra.</p></div>
  <div class="pd-version">部门报账管理系统 v1.0.5</div>
  <aside class="pd-detail" id="pd-detail"><button class="pd-close" aria-label="关闭">×</button><span class="pd-eyebrow">ORBITAL DATA / 实时构成</span><h2 id="pd-heading"></h2><div class="pd-summary" id="pd-summary"></div><button class="pd-add" id="pd-add">＋ 新增报销记录</button><div class="pd-list" id="pd-list"></div><div class="pd-sub" id="pd-sub"><button class="pd-back" aria-label="返回">←</button><h3 id="pd-sub-title"></h3><div id="pd-sub-list"></div></div></aside>
</section>
<script id="planet-dashboard-integrated-script">
(()=>{
  const RECORD_KEY='dept_expense_records',space=document.querySelector('#pd-space'),detail=document.querySelector('#pd-detail'),heading=document.querySelector('#pd-heading'),summary=document.querySelector('#pd-summary'),list=document.querySelector('#pd-list'),sub=document.querySelector('#pd-sub'),subTitle=document.querySelector('#pd-sub-title'),subList=document.querySelector('#pd-sub-list'),add=document.querySelector('#pd-add'),modeButtons=[...document.querySelectorAll('#pd-switch button')];
  let mode='classic',currentKey='',currentGroups=[];
  const money=n=>'¥'+Number(n||0).toFixed(2),records=()=>{try{const v=JSON.parse(localStorage.getItem(RECORD_KEY)||'[]');return Array.isArray(v)?v:[]}catch{return[]}},sum=a=>a.reduce((n,x)=>n+Number(x.amount||0),0);
  function setMode(next){mode=next;space.classList.toggle('open',next==='planet');modeButtons.forEach(b=>b.classList.toggle('active',b.dataset.mode===next));closeDetail()}
  modeButtons.forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
  function buildStars(){const star=space.querySelector('.pd-stars'),w=innerWidth,h=innerHeight,points=[],bright=[];for(let i=0;i<Math.max(180,Math.floor(w*h/4800));i++){const x=Math.floor(Math.random()*w),y=Math.floor(Math.random()*h);points.push(`${x}px ${y}px 0 rgba(225,225,220,${(.16+Math.random()*.7).toFixed(2)})`)}for(let i=0;i<Math.max(34,Math.floor(w*h/22000));i++){bright.push(`${Math.floor(Math.random()*w)}px ${Math.floor(Math.random()*h)}px 0 rgba(245,245,240,${(.25+Math.random()*.65).toFixed(2)})`)}star.style.boxShadow=points.join(',');const sheet=document.getElementById('pd-random-stars-style')||document.head.appendChild(Object.assign(document.createElement('style'),{id:'pd-random-stars-style'}));sheet.textContent=`.pd-stars:after{box-shadow:${bright.join(',')}}`}
  buildStars();addEventListener('resize',buildStars);
  function rowText(r){return `${r.travelDate||'未填写日期'} · ${r.category||'未分类'} · 支付人：${r.actualPayer||'未填写'}${r.internalSettler?' · 结算人：'+r.internalSettler:''}`}
  function groupBy(items,keyFn){const map=new Map;items.forEach(r=>{const k=keyFn(r)||'未填写';if(!map.has(k))map.set(k,[]);map.get(k).push(r)});return [...map].map(([name,rows])=>({name,rows,total:sum(rows)})).sort((a,b)=>b.total-a.total)}
  function stats(items){const total=sum(items),pending=sum(items.filter(r=>r.status!=='reimbursed')),internal=sum(items.filter(r=>r.internalSettler||r.status==='internal_settled')),reimbursed=sum(items.filter(r=>r.status==='reimbursed'));return{total,pending,internal,reimbursed}}
  function summaryHtml(cells){return cells.map(([a,b])=>`<div><small>${a}</small><strong>${b}</strong></div>`).join('')}
  function recordRows(items){return items.map(r=>`<div class="pd-row"><div><h3>${r.projectName||'未填写项目'}</h3><p>${rowText(r)}</p></div><b>${money(r.amount)}</b></div>`).join('')||'<div class="pd-row"><p>暂无记录</p><b>¥0.00</b></div>'}
  function closeDetail(){detail.className='pd-detail';space.classList.remove('inspecting');document.querySelectorAll('.pd-body.selected').forEach(x=>x.classList.remove('selected'));sub.classList.remove('open')}
  function openDetail(key,body){const items=records(),s=stats(items),left=body.getBoundingClientRect().left+body.offsetWidth/2<innerWidth/2;currentKey=key;document.querySelectorAll('.pd-body.selected').forEach(x=>x.classList.remove('selected'));body.classList.add('selected');space.classList.add('inspecting');detail.className='pd-detail open '+(left?'right':'left');sub.classList.remove('open');
    if(key==='total'){heading.textContent='报账总览';summary.innerHTML=summaryHtml([['总报账费用',money(s.total)],['待公司报销',money(s.pending)],['内部已垫付',money(s.internal)],['公司已报销',money(s.reimbursed)]]);add.style.display='block';currentGroups=[];list.innerHTML=recordRows(items);return}
    add.style.display='none';currentGroups=key==='people'?groupBy(items,r=>(r.internalSettler&&r.internalSettler.trim())||r.actualPayer):key==='projects'?groupBy(items,r=>r.projectName):groupBy(items,r=>r.category);heading.textContent=key==='people'?'人员应报销金额':key==='projects'?'项目结算进度':'费用分类统计';summary.innerHTML=summaryHtml([['合计金额',money(s.total)],['统计项目',currentGroups.length+(key==='people'?' 人':key==='projects'?' 个':' 类')]]);list.innerHTML=currentGroups.map((g,i)=>`<button class="pd-row" data-group="${i}"><div><h3>${g.name}</h3><p>${g.rows.length} 笔 · 点击查看明细</p></div><b>${money(g.total)}</b></button>`).join('')||'<div class="pd-row"><p>暂无数据</p><b>¥0.00</b></div>'}
  document.querySelectorAll('[data-pd-key]').forEach(body=>body.onclick=()=>openDetail(body.dataset.pdKey,body));
  detail.querySelector('.pd-close').onclick=closeDetail;sub.querySelector('.pd-back').onclick=()=>sub.classList.remove('open');
  list.onclick=e=>{const row=e.target.closest('[data-group]');if(!row)return;const g=currentGroups[Number(row.dataset.group)];subTitle.textContent=g.name;subList.innerHTML=recordRows(g.rows);sub.classList.add('open')};
  add.onclick=()=>{setMode('classic');setTimeout(()=>{const buttons=[...document.querySelectorAll('button')];const target=buttons.find(b=>b.textContent.includes('新增报账记录')&&!b.closest('#pd-space'));target&&target.click()},60)};
  window.addEventListener('dept-expense-sync',()=>{if(detail.classList.contains('open')){const body=document.querySelector(`[data-pd-key="${currentKey}"]`);body&&openDetail(currentKey,body)}});
  const dashboardVisible=()=>[...document.querySelectorAll('button')].some(b=>b.textContent.trim().includes('看板')&&b.className.includes('text-blue-600'));
  const appRoot=document.getElementById('root');if(appRoot){new MutationObserver(()=>{document.querySelector('#pd-switch').style.display=dashboardVisible()?'flex':'none';if(!dashboardVisible()&&mode==='planet')setMode('classic')}).observe(appRoot,{subtree:true,childList:true,attributes:true})}else{modeButtons.find(b=>b.dataset.mode==='classic').onclick=()=>location.href='./部门报账管理系统_行星视图测试版.html';setMode('planet')}
})();
</script>

</body></html>
